name: HR Specialist Agent (Scheduled Reports)

on:
  schedule:
    - cron: '0 12 * * *' # 09:00 BRT
    - cron: '0 16 * * *' # 13:00 BRT
    - cron: '0 21 * * *' # 18:00 BRT
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Run HR Agent & Send Report
        env:
          TELEGRAM_TOKEN: "7696538175:AAE-5hquTYBzos0ab8gfJxjpon4NXrXHaIw"
          TELEGRAM_CHAT_ID: "5881090650"
        run: |
          python agente_de_RH/rh_specialist.py
