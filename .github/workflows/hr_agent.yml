name: HR Specialist Agent (Auto-Pilot)

on:
  schedule:
    - cron: '0 */4 * * *' # Roda a cada 4 horas para máxima intensidade
  workflow_dispatch: # Permite rodar manualmente também

jobs:
  hunt_jobs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4

      - name: Run HR Agent
        run: |
          python agente_de_RH/rh_specialist.py

      - name: Commit and Push changes
        run: |
          git config --global user.name 'HR-Agent-Bot'
          git config --global user.email 'hr-agent@carloscostato.com'
          git add agente_de_RH/applications.json
          git commit -m "bot: auto-update job applications [skip ci]" || echo "No changes to commit"
          git push
